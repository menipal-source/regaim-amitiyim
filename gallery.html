<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>גלריה מלאה | רגעים אמיתיים</title>
  <link rel="icon" type="image/png" href="לוגו שחור.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;200;300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #09080a;
      --bg2:    #100e11;
      --cream:  #f0e6d0;
      --cream2: #c8bba5;
      --gold:   #c4954a;
      --gold2:  #9e7038;
      --muted:  #4a4040;
      --border: rgba(196,149,74,0.2);
      --font:   'Heebo', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font);
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
    }

    /* ─── NAV ────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9,8,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    .nav-logo img {
      height: 42px;
      width: auto;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--cream2);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--gold); }
    .nav-back::before {
      content: '›';
      font-size: 1.1rem;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    .gallery-page-header {
      padding: 9rem 3rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .gallery-page-header p {
      font-size: 0.72rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .gallery-page-header h1 {
      font-family: var(--font);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 200;
      letter-spacing: 0.08em;
      color: var(--cream);
      line-height: 1.1;
    }

    .gallery-page-header span {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      display: block;
      margin-top: 1rem;
    }

    /* ─── MASONRY GRID ───────────────────────────────────── */
    .gallery-masonry {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      columns: 3;
      column-gap: 12px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 12px;
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }

    .masonry-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(9,8,10,0.25);
      transition: opacity 0.4s;
    }
    .masonry-item:hover::after { opacity: 0; }

    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .masonry-item:hover img { transform: scale(1.03); }

    /* ─── LIGHTBOX ───────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }
    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      width: 44px; height: 44px;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--cream2);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .lightbox-close:hover { border-color: var(--gold); color: var(--gold); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--cream2);
      font-size: 1.4rem;
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .lightbox-nav:hover { border-color: var(--gold); color: var(--gold); }
    .lightbox-prev { right: 1.5rem; }
    .lightbox-next { left: 1.5rem; }
    .lightbox-counter {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    footer img { height: 50px; width: auto; margin-bottom: 0.8rem; }
    footer p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ─── REVEAL ─────────────────────────────────────────── */
    .masonry-item {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .masonry-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .gallery-masonry { columns: 2; }
      nav { padding: 1rem 1.5rem; }
    }
    @media (max-width: 560px) {
      .gallery-masonry { columns: 1; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-back">חזרה לדף הבית</a>
    <a href="index.html" class="nav-logo">
      <img src="לוגו לבן.png" alt="רגעים אמיתיים">
    </a>
  </nav>

  <div class="gallery-page-header">
    <p>עבודות נבחרות</p>
    <h1>הגלריה המלאה</h1>
    <span>22 תמונות · לחצו על תמונה להגדלה</span>
  </div>

  <div class="gallery-masonry">
    <div class="masonry-item"><img src="תמונות/ld1.jpg"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld2.jpg"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld3.jpg"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld4.JPG"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld5.JPG"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld6.JPG"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld7.jpg"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld8.jpg"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld9.jpg"  alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld10.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld11.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld12.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld13.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld14.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld15.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld16.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld17.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld18.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld19.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld20.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld21.jpg" alt="צילום חתונה"></div>
    <div class="masonry-item"><img src="תמונות/ld22.jpg" alt="צילום חתונה"></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">›</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">‹</button>
    <span class="lightbox-counter" id="lightboxCounter"></span>
  </div>

  <footer>
    <img src="לוגו לבן.png" alt="רגעים אמיתיים">
    <p>© 2025 רגעים אמיתיים · צילום חתונות ואירועים</p>
  </footer>

  <script>
    // Reveal on scroll
    const items = document.querySelectorAll('.masonry-item');
    const obs = new IntersectionObserver(entries => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), (i % 3) * 60);
        }
      });
    }, { threshold: 0.05 });
    items.forEach(el => obs.observe(el));

    // Lightbox
    const imgs       = Array.from(document.querySelectorAll('.masonry-item img'));
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lightboxImg');
    const lbCounter  = document.getElementById('lightboxCounter');
    let current      = 0;

    function open(idx) {
      current = idx;
      lbImg.src = imgs[idx].src;
      lbCounter.textContent = `${idx + 1} / ${imgs.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    function nav(dir) {
      current = (current + dir + imgs.length) % imgs.length;
      lbImg.src = imgs[current].src;
      lbCounter.textContent = `${current + 1} / ${imgs.length}`;
    }

    imgs.forEach((img, i) => img.parentElement.addEventListener('click', () => open(i)));
    document.getElementById('lightboxClose').addEventListener('click', close);
    document.getElementById('lightboxPrev').addEventListener('click', () => nav(1));
    document.getElementById('lightboxNext').addEventListener('click', () => nav(-1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      close();
      if (e.key === 'ArrowRight')  nav(1);
      if (e.key === 'ArrowLeft')   nav(-1);
    });
  </script>
</body>
</html>
